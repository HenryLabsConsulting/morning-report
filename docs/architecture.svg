<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="380" viewBox="0 0 1180 380" font-family="Segoe UI,Helvetica,Arial,sans-serif">
  <rect width="1180" height="380" fill="#ffffff"/>
  <text x="30" y="38" fill="#16202e" font-size="20" font-weight="700">morning-report pipeline</text>
  <text x="30" y="60" fill="#7a8699" font-size="13">Three vendor systems to one daily email, with schema-drift detection in the middle.</text>

  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#9aa6ba"/></marker>
  </defs>

  <!-- sources -->
  <g>
    <rect x="30" y="96" width="150" height="44" rx="8" fill="#f4f7fb" stroke="#dbe2ec"/>
    <text x="105" y="123" fill="#16202e" font-size="13" font-weight="600" text-anchor="middle">HousecallPro API</text>
    <rect x="30" y="158" width="150" height="44" rx="8" fill="#f4f7fb" stroke="#dbe2ec"/>
    <text x="105" y="185" fill="#16202e" font-size="13" font-weight="600" text-anchor="middle">RingCentral API</text>
    <rect x="30" y="220" width="150" height="44" rx="8" fill="#f4f7fb" stroke="#dbe2ec"/>
    <text x="105" y="247" fill="#16202e" font-size="13" font-weight="600" text-anchor="middle">Google Reviews API</text>
  </g>

  <!-- extract -->
  <rect x="240" y="142" width="118" height="76" rx="10" fill="#ffffff" stroke="#dbe2ec"/>
  <text x="299" y="174" fill="#16202e" font-size="13.5" font-weight="600" text-anchor="middle">Extract</text>
  <text x="299" y="192" fill="#7a8699" font-size="11.5" text-anchor="middle">HTTP + retry</text>

  <!-- drift -->
  <rect x="392" y="142" width="132" height="76" rx="10" fill="#fff7ed" stroke="#f0d6a8"/>
  <text x="458" y="170" fill="#a8650b" font-size="13.5" font-weight="600" text-anchor="middle">Schema-Drift</text>
  <text x="458" y="187" fill="#a8650b" font-size="13.5" font-weight="600" text-anchor="middle">Check</text>
  <text x="458" y="205" fill="#b07a2e" font-size="11" text-anchor="middle">stops on missing fields</text>

  <!-- transform -->
  <rect x="558" y="142" width="118" height="76" rx="10" fill="#ffffff" stroke="#dbe2ec"/>
  <text x="617" y="174" fill="#16202e" font-size="13.5" font-weight="600" text-anchor="middle">Transform</text>
  <text x="617" y="192" fill="#7a8699" font-size="11.5" text-anchor="middle">normalize</text>

  <!-- postgres -->
  <rect x="710" y="142" width="118" height="76" rx="10" fill="#ffffff" stroke="#dbe2ec"/>
  <text x="769" y="170" fill="#16202e" font-size="13.5" font-weight="600" text-anchor="middle">PostgreSQL</text>
  <text x="769" y="188" fill="#7a8699" font-size="11.5" text-anchor="middle">upsert</text>
  <text x="769" y="204" fill="#7a8699" font-size="11.5" text-anchor="middle">warehouse</text>

  <!-- digest -->
  <rect x="862" y="142" width="128" height="76" rx="10" fill="#eaf1ff" stroke="#bcd3ff"/>
  <text x="926" y="170" fill="#2a66d9" font-size="13.5" font-weight="600" text-anchor="middle">Digest + Claude</text>
  <text x="926" y="188" fill="#3b6fd0" font-size="11.5" text-anchor="middle">metrics + summary</text>
  <text x="926" y="204" fill="#3b6fd0" font-size="11.5" text-anchor="middle">(demo mode keyless)</text>

  <!-- email -->
  <rect x="1024" y="142" width="126" height="76" rx="10" fill="#16202e"/>
  <text x="1087" y="174" fill="#ffffff" font-size="13.5" font-weight="600" text-anchor="middle">HTML Email</text>
  <text x="1087" y="192" fill="#aeb9cc" font-size="11.5" text-anchor="middle">to inbox / MailHog</text>

  <!-- arrows -->
  <line x1="180" y1="118" x2="230" y2="172" stroke="#9aa6ba" stroke-width="1.6" marker-end="url(#a)"/>
  <line x1="180" y1="180" x2="238" y2="180" stroke="#9aa6ba" stroke-width="1.6" marker-end="url(#a)"/>
  <line x1="180" y1="242" x2="230" y2="190" stroke="#9aa6ba" stroke-width="1.6" marker-end="url(#a)"/>
  <line x1="358" y1="180" x2="390" y2="180" stroke="#9aa6ba" stroke-width="1.6" marker-end="url(#a)"/>
  <line x1="524" y1="180" x2="556" y2="180" stroke="#9aa6ba" stroke-width="1.6" marker-end="url(#a)"/>
  <line x1="676" y1="180" x2="708" y2="180" stroke="#9aa6ba" stroke-width="1.6" marker-end="url(#a)"/>
  <line x1="828" y1="180" x2="860" y2="180" stroke="#9aa6ba" stroke-width="1.6" marker-end="url(#a)"/>
  <line x1="990" y1="180" x2="1022" y2="180" stroke="#9aa6ba" stroke-width="1.6" marker-end="url(#a)"/>

  <text x="30" y="320" fill="#7a8699" font-size="12.5">Runs on a schedule (cron or a cloud runbook). The mock APIs ship with the repo, so the whole pipeline runs with no vendor accounts.</text>
  <text x="30" y="342" fill="#7a8699" font-size="12.5">A vendor changing their payload surfaces as a drift report at 6am instead of a silently broken dashboard.</text>
</svg>
